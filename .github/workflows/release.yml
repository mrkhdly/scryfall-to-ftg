name: Package Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:'- %s' --no-merges | grep -v 'chore: bump version')
          else
            BODY=$(git log --pretty=format:'- %s' --no-merges ${PREV_TAG}..HEAD^ | grep -v 'chore: bump version')
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          zip -r scryfall-to-ftg.zip \
            manifest.json \
            content.js \
            icons/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scryfall-to-ftg
          path: scryfall-to-ftg.zip

      - name: Delete existing release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ github.ref_name }}" --yes || true

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: scryfall-to-ftg.zip
          body: ${{ steps.notes.outputs.body }}