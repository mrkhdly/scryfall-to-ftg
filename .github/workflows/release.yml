name: Package Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r scryfall-to-ftg.zip \
            manifest.json \
            content.js \
            icons/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scryfall-to-ftg
          path: scryfall-to-ftg.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: scryfall-to-ftg.zip